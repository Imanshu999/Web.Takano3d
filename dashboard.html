<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Takano3D — Auth Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* ═══════════════════════════════════════════════════════
   TAKANO3D — SESSION 1 AUTH PORTAL (AUTOMATED GATEWAY)
   Premium Dark Theme | Glassmorphism | Mobile-First
   ═══════════════════════════════════════════════════════ */

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-deep: #120b24;
  --bg-surface: #1a0f36;
  --bg-elevated: #231548;
  --glass-bg: rgba(26, 15, 54, 0.65);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-highlight: rgba(255, 255, 255, 0.04);
  --text-primary: #f0ecf9;
  --text-secondary: #a89cc8;
  --text-muted: #6b5f8a;
  --accent-start: #ff4500;
  --accent-end: #ff8c00;
  --accent-glow: rgba(255, 69, 0, 0.35);
  --error: #ff4d6a;
  --success: #00d68f;
  --radius-xl: 28px;
  --radius-md: 12px;
  --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-spring: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  font-family: var(--font-main);
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* ── Animated Background ── */
.auth-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: 
    radial-gradient(ellipse 80% 60% at 50% -20%, rgba(255, 69, 0, 0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(120, 40, 200, 0.1) 0%, transparent 50%),
    radial-gradient(ellipse 50% 40% at 10% 60%, rgba(255, 140, 0, 0.06) 0%, transparent 50%),
    linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-surface) 100%);
}

.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.4;
  animation: orbFloat 20s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}

.orb-1 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(255, 69, 0, 0.15), transparent 70%); top: -10%; right: -5%; }
.orb-2 { width: 350px; height: 350px; background: radial-gradient(circle, rgba(138, 43, 226, 0.12), transparent 70%); bottom: -15%; left: -10%; animation-delay: -7s; }
.orb-3 { width: 250px; height: 250px; background: radial-gradient(circle, rgba(255, 140, 0, 0.1), transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -14s; }

@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(30px, -40px) scale(1.05); }
  50% { transform: translate(-20px, 20px) scale(0.95); }
  75% { transform: translate(15px, 35px) scale(1.02); }
}

/* ── Main Card ── */
.auth-wrapper {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 440px;
  padding: 20px;
  animation: containerEntry 0.8s var(--transition-smooth) both;
}

@keyframes containerEntry {
  from { opacity: 0; transform: translateY(30px) scale(0.96); filter: blur(8px); }
  to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}

.auth-card {
  background: var(--glass-bg);
  backdrop-filter: blur(40px) saturate(1.5);
  -webkit-backdrop-filter: blur(40px) saturate(1.5);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-xl);
  padding: 50px 40px;
  text-align: center;
  box-shadow: 
    0 0 0 1px rgba(255, 255, 255, 0.03) inset,
    0 25px 60px -12px rgba(0, 0, 0, 0.5),
    0 0 80px -20px var(--accent-glow);
}

.auth-brand {
  margin-bottom: 24px;
}

.auth-logo {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 64px;
  height: 64px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
  margin-bottom: 20px;
  box-shadow: 0 8px 24px -4px var(--accent-glow);
  position: relative;
}

.auth-logo i {
  font-size: 28px;
  color: white;
  animation: pulseCube 2s infinite ease-in-out;
}

@keyframes pulseCube {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

.auth-brand h1 {
  font-size: 1.65rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  color: var(--text-primary);
}

.auth-brand p {
  font-size: 0.9rem;
  color: var(--text-secondary);
  margin-top: 6px;
}

/* ── Status Loader Section ── */
.gateway-loader {
  margin-top: 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.spinner-ring {
  width: 36px;
  height: 36px;
  border: 3px solid rgba(255, 69, 0, 0.1);
  border-top: 3px solid var(--accent-start);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.status-message {
  font-size: 0.85rem;
  font-family: var(--font-main);
  color: var(--text-muted);
  font-weight: 500;
  letter-spacing: 0.02em;
  transition: color 0.3s ease;
}

/* ── Toast Notifications ── */
.toast-container {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 10px;
  pointer-events: none;
}

.toast {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  background: var(--bg-elevated);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  backdrop-filter: blur(20px);
  box-shadow: 0 12px 40px -8px rgba(0, 0, 0, 0.6);
  animation: toastIn 0.4s var(--transition-spring) both;
  max-width: 380px;
  min-width: 280px;
  pointer-events: auto;
}

.toast.removing { animation: toastOut 0.3s ease-in both; }
.toast-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; }
.toast.success .toast-icon { background: rgba(0, 214, 143, 0.15); color: var(--success); }
.toast.error .toast-icon { background: rgba(255, 77, 106, 0.15); color: var(--error); }
.toast.info .toast-icon { background: rgba(255, 140, 0, 0.15); color: var(--accent-end); }
.toast-content { flex: 1; min-width: 0; }
.toast-title { font-size: 0.85rem; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
.toast-message { font-size: 0.75rem; color: var(--text-secondary); line-height: 1.4; word-break: break-word; }

@keyframes toastIn { from { opacity: 0; transform: translateX(100%) scale(0.8); } to { opacity: 1; transform: translateX(0) scale(1); } }
@keyframes toastOut { to { opacity: 0; transform: translateX(100%) scale(0.8); } }

.fb-status {
  position: fixed;
  bottom: 16px;
  left: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: var(--bg-elevated);
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  font-size: 0.7rem;
  color: var(--text-muted);
  z-index: 100;
  backdrop-filter: blur(10px);
}

.fb-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--error); transition: background 0.3s ease; }
.fb-dot.connected { background: var(--success); box-shadow: 0 0 6px var(--success); }
</style>
</head>
<body>

<div class="auth-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="toast-container" id="toastContainer"></div>

<div class="fb-status" id="fbStatus">
  <div class="fb-dot" id="fbDot"></div>
  <span id="fbStatusText">Connecting Ecosystem...</span>
</div>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="auth-logo">
        <i class="fas fa-cube"></i>
      </div>
      <h1>Takano3D</h1>
      <p>Developer Ecosystem & Project Hub</p>
    </div>

    <div class="gateway-loader">
      <div class="spinner-ring" id="gatewaySpinner"></div>
      <div class="status-message" id="gatewayStatus">Verifying session protocol...</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

// ═══════════════════════════════════════════════════════
// ⚙️ REAL INJECTED FIREBASE CONFIGURATION KEYS
// ═══════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyBNJ9WTZc-96w3SsMBgMdKRfX9C-N4_oj4",
  authDomain: "optical-wall-434100-g5.firebaseapp.com",
  projectId: "optical-wall-434100-g5",
  storageBucket: "optical-wall-434100-g5.firebasestorage.app",
  messagingSenderId: "36347733113",
  appId: "1:36347733113:web:db27c00c7b0de2f6fee0a8",
  measurementId: "G-MM6Q5ERBHC"
};

// INITIALIZE FIREBASE
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const dot = document.getElementById('fbDot');
const fbLabel = document.getElementById('fbStatusText');
const gatewayStatus = document.getElementById('gatewayStatus');
const gatewaySpinner = document.getElementById('gatewaySpinner');

// Update Firebase Status Indicator
dot.classList.add('connected');
fbLabel.textContent = "Firebase Connected";

// ADMIN CREDENTIAL VERIFICATION RULE
const MASTER_ADMIN_EMAIL = "dome74677@gmail.com";

// AUTH SESSION DETECTOR
onAuthStateChanged(auth, (user) => {
  if (user) {
    console.log('[Auth Gateway] Session identified:', user.email);
    
    if (user.email.toLowerCase() === MASTER_ADMIN_EMAIL.toLowerCase()) {
      gatewayStatus.textContent = "Access Authorized. Routing...";
      gatewayStatus.style.color = "#00d68f";
      showToast('success', 'Admin Verification Passed', 'Initializing Secure Module Pipeline.');
      
      setTimeout(() => {
        handleAdminRouting();
      }, 1500);
    } else {
      gatewayStatus.textContent = "Access Denied: Restricted Node.";
      gatewayStatus.style.color = "#ff4d6a";
      gatewaySpinner.style.display = "none";
      showToast('error', 'Authorization Failed', 'This account does not have developer privileges.');
    }
  } else {
    console.log('[Auth Gateway] No active session found.');
    gatewayStatus.textContent = "Authentication Required.";
    gatewayStatus.style.color = "#ff8c00";
    gatewaySpinner.style.display = "none";
    showToast('info', 'Gateway Offline', 'No active login tokens detected. Please authenticate first.');
  }
});

function handleAdminRouting() {
  console.log('%c⚡ ADMIN ACCESS GRANTED ⚡', 'color: #ff4500; font-size: 16px; font-weight: bold; background: #1a0f36; padding: 8px 16px; border-radius: 4px;');
  
  // यहाँ आप अपने डैशबोर्ड या अगले पेज का यूआरएल (URL) डाल सकते हैं
  window.location.href = "dashboard.html"; 
}

function showToast(type, title, message, duration = 4500) {
  const container = document.getElementById('toastContainer');
  const icons = { success: 'fa-check', error: 'fa-exclamation', info: 'fa-info' };

  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `
    <div class="toast-icon"><i class="fas ${icons[type]}"></i></div>
    <div class="toast-content">
      <div class="toast-title">${title}</div>
      <div class="toast-message">${message}</div>
    </div>
  `;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'toastOut 0.3s ease-in both';
    setTimeout(() => toast.remove(), 300);
  }, duration);
}
</script>

</body>
</html>
