<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Takano3D — Master Admin Control</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root {
    --bg-deep: #0a0518;
    --bg-surface: #120b24;
    --glass-border: rgba(255, 255, 255, 0.08);
    --text-primary: #f0ecf9;
    --text-secondary: #a89cc8;
    --accent: #ff4500;
    --error: #ff4d6a;
    --success: #00d68f;
  }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    padding: 30px;
  }
  .master-box {
    max-width: 1200px;
    margin: 0 auto;
  }
  .header {
    border-bottom: 2px solid var(--glass-border);
    padding-bottom: 20px;
    margin-bottom: 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .user-row {
    background: var(--bg-surface);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .user-info-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    padding-bottom: 10px;
    margin-bottom: 15px;
  }
  .admin-input {
    background: #1a0f36;
    border: 1px solid var(--glass-border);
    color: #fff;
    padding: 6px 12px;
    border-radius: 6px;
  }
  .btn-action {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
  }
  .file-item-admin {
    background: rgba(255,255,255,0.02);
    padding: 10px;
    border-radius: 6px;
    margin-top: 5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
  }
</style>
</head>
<body>

<div class="master-box">
  <div class="header">
    <div>
      <h1 style="font-weight: 800; background: linear-gradient(135deg, #fff, #ff4500); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"><i class="fas fa-user-shield"></i> Takano3D Admin Core Node</h1>
      <p style="color: var(--success); font-weight: 600; font-size: 0.85rem; margin-top: 5px;"><i class="fas fa-circle"></i> Root Security Shield Active</p>
    </div>
    <button class="btn-action" id="btnAdminLogout" style="background: var(--error);">Lock Console</button>
  </div>

  <h2 style="margin-bottom: 20px;">All Connected Network Users & Vaults</h2>
  <div id="usersMasterContainer">
     </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNJ9WTZc-96w3SsMBgMdKRfX9C-N4_oj4",
  authDomain: "optical-wall-434100-g5.firebaseapp.com",
  projectId: "optical-wall-434100-g5",
  databaseURL: "https://optical-wall-434100-g5-default-rtdb.firebaseio.com",
  storageBucket: "optical-wall-434100-g5.firebasestorage.app",
  messagingSenderId: "36347733113",
  appId: "1:36347733113:web:db27c00c7b0de2f6fee0a8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const ALLOWED_ADMINS = ["dome74677@gmail.com", "n4062226@gmail.com"];

onAuthStateChanged(auth, (user) => {
  if (user) {
    const isAdmin = ALLOWED_ADMINS.some(email => email.toLowerCase() === user.email.toLowerCase());
    if (!isAdmin) {
      alert("Unauthorized Access Attempt!");
      window.location.href = "main.html"; // Kick standard users to user portal
    } else {
      loadMasterEcosystemData();
    }
  } else {
    window.location.href = "index.html";
  }
});

// GOD MODE STREAM: Reads absolutely everything inside "users" reference tree
function loadMasterEcosystemData() {
  onValue(ref(db, "users"), (snapshot) => {
    const container = document.getElementById('usersMasterContainer');
    container.innerHTML = "";
    
    if(snapshot.exists()) {
      snapshot.forEach((userSnap) => {
        const userId = userSnap.key;
        const userData = userSnap.val();
        const profile = userData.profile || { username: "Unnamed Cadet" };
        const files = userData.files || {};
        
        // Build User Box HTML
        let filesHtml = "";
        Object.keys(files).forEach((fileKey) => {
          const file = files[fileKey];
          filesHtml += `
            <div class="file-item-admin">
              <span><i class="far fa-file"></i> <b>${file.fileName}</b> (${file.fileSize})</span>
              <button class="btn-action" style="background: var(--error); padding: 4px 8px; font-size: 0.75rem;" onclick="adminDeleteFile('${userId}', '${fileKey}')">Delete as Admin</button>
            </div>
          `;
        });
        
        if(filesHtml === "") filesHtml = `<p style="color: var(--text-secondary); font-size: 0.8rem; padding: 5px;">No files uploaded by this user.</p>`;

        container.innerHTML += `
          <div class="user-row">
            <div class="user-info-header">
              <div>
                <span style="font-size: 1.1rem; font-weight: 600; color: #fff;">UID: ${userId}</span>
              </div>
              <div>
                <input type="text" class="admin-input" id="input-${userId}" value="${profile.username}">
                <button class="btn-action" onclick="adminEditProfile('${userId}')">Force Edit Username</button>
              </div>
            </div>
            
            <div style="margin-top: 10px;">
              <h4 style="color: var(--accent); margin-bottom: 8px;"><i class="fas fa-folder-open"></i> User Vault Assets:</h4>
              ${filesHtml}
            </div>
          </div>
        `;
      });
    } else {
      container.innerHTML = "<p>No nodes or users discovered inside Firebase tree.</p>";
    }
  });
}

// Admin Authority: Edit anyone's profile username
window.adminEditProfile = function(userId) {
  const newValue = document.getElementById(`input-${userId}`).value;
  if(confirm("Force modify this user's profile metadata?")) {
    set(ref(db, `users/${userId}/profile`), { username: newValue });
  }
}

// Admin Authority: Delete any user's file instantly
window.adminDeleteFile = function(userId, fileKey) {
  if(confirm("Do you want to exercise admin override and permanently remove this asset?")) {
    remove(ref(db, `users/${userId}/files/${fileKey}`));
  }
}

document.getElementById('btnAdminLogout').addEventListener('click', () => {
  signOut(auth).then(() => window.location.href = "index.html");
});
</script>
</body>
</html>
